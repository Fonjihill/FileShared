spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

server:
  port: 0
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: test-jwt-secret-key-must-be-at-least-256-bits-long-for-testing-only
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
