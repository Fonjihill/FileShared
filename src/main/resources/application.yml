spring:
  application:
    name: fileshared


  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5434/fileshared_db
    username: fileshared
    password: fileshared_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    default-property-inclusion: non_null

server:
  port: 8081
  servlet:
    context-path: /api/v1

# JWT Configuration
app:
  jwt:
    secret: dtf-jwt-secret-key-cameroun-2026-must-be-at-least-256-bits-long
    expiration-ms: 86400000 # 24h
    refresh-expiration-ms: 604800000 # 7 days
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:4200

# Logging
logging:
  level:
    com.bomunto.fileshared: DEBUG
    org.hibernate.SQL: WARN

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /docs/api
  swagger-ui:
    path: /docs/swagger
    tags-sorter: alpha
    operations-sorter: method
