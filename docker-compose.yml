services:
  postgres:
    image: postgres:16-alpine
    container_name: fileshared-postgres
    environment:
      POSTGRES_USER: fileshared
      POSTGRES_PASSWORD: fileshared_secret
      POSTGRES_DB: fileshared_db
    ports:
      - "5434:5432"
    volumes:
      - fileshared-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshared -d fileshared_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  fileshared-pgdata:
