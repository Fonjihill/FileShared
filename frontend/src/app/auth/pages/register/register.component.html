<div class="auth-container">
  <p-card header="Inscription">

    <div *ngIf="erreur" class="erreur">{{ erreur }}</div>

    <form [formGroup]="formulaire" (ngSubmit)="inscrire()">

      <div class="champ">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" pInputText formControlName="username">
        <small *ngIf="formulaire.get('username')?.invalid && formulaire.get('username')?.touched">
          Le nom d'utilisateur est obligatoire
        </small>
      </div>

      <div class="champ">
        <label for="email">Email</label>
        <input id="email" type="email" pInputText formControlName="email">
        <small *ngIf="formulaire.get('email')?.invalid && formulaire.get('email')?.touched">
          Entrez un email valide
        </small>
      </div>

      <div class="champ">
        <label for="motDePasse">Mot de passe</label>
        <p-password id="motDePasse" formControlName="motDePasse"
                    [toggleMask]="true" [feedback]="false" styleClass="w-full">
        </p-password>
        <small *ngIf="formulaire.get('motDePasse')?.invalid && formulaire.get('motDePasse')?.touched">
          6 caractères minimum
        </small>
      </div>

      <button pButton type="submit" label="S'inscrire"
              [disabled]="formulaire.invalid || chargement"
              [loading]="chargement"
              class="w-full">
      </button>
    </form>
    <p class="lien"><a routerLink="/login">Déjà un compte ? Se connecter</a></p>
  </p-card>
</div>
