<div class="auth-page">
  <div class="auth-card">
    <!-- Branding -->
    <div class="auth-header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 3C2 1.89543 2.89543 1 4 1H8.58579C8.851 1 9.10536 1.10536 9.29289 1.29289L13.7071 5.70711C13.8946 5.89464 14 6.149 14 6.41421V13C14 14.1046 13.1046 15 12 15H4C2.89543 15 2 14.1046 2 13V3Z" fill="white"/>
            <path d="M9 1V5C9 5.55228 9.44772 6 10 6H14" fill="white" fill-opacity="0.5"/>
            <path d="M7 9L9.5 11.5M9.5 11.5L12 9M9.5 11.5V7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span>FileShared</span>
      </div>
      <p class="auth-subtitle">Connectez-vous pour acceder a vos fichiers</p>
    </div>

    <!-- Error -->
    <div *ngIf="erreur" class="erreur">
      <i class="pi pi-exclamation-circle"></i>
      <span>{{ erreur }}</span>
    </div>

    <!-- Form -->
    <form [formGroup]="formulaire" (ngSubmit)="connecter()">
      <div class="champ">
        <label for="email">Adresse email</label>
        <input id="email" type="email" pInputText formControlName="email"
               placeholder="nom@exemple.com" class="w-full">
        <small *ngIf="formulaire.get('email')?.invalid && formulaire.get('email')?.touched"
               class="validation-error">
          Entrez un email valide
        </small>
      </div>

      <div class="champ">
        <label for="motDePasse">Mot de passe</label>
        <p-password id="motDePasse" formControlName="motDePasse"
                    [toggleMask]="true" [feedback]="false"
                    styleClass="w-full" inputStyleClass="w-full"
                    placeholder="Votre mot de passe">
        </p-password>
        <small *ngIf="formulaire.get('motDePasse')?.invalid && formulaire.get('motDePasse')?.touched"
               class="validation-error">
          6 caracteres minimum
        </small>
      </div>

      <button pButton type="submit" label="Se connecter"
              icon="pi pi-sign-in"
              [disabled]="formulaire.invalid || chargement"
              [loading]="chargement"
              class="w-full auth-submit">
      </button>
    </form>

    <div class="auth-footer">
      <span>Pas encore de compte ?</span>
      <a routerLink="/register">Creer un compte</a>
    </div>
  </div>
</div>
